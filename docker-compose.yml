services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-novel
    ports:
      - "8899:3000"
    volumes:
      - ./data:/app/data      # SQLite DB + Artifact Store
    environment:
      - DATA_DIR=/app/data
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3